<svg width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6cb4ee"/>
      <stop offset="100%" style="stop-color:#4a9eda"/>
    </linearGradient>
    <linearGradient id="haiku" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="sonnet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6cb4ee"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="opus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="1"/>
    </pattern>
    <rect width="1280" height="640" fill="url(#grid)"/>
  </g>

  <!-- Decorative routing paths -->
  <g opacity="0.12" stroke-width="2" fill="none">
    <!-- Left side paths -->
    <path d="M80 320 Q200 200 350 280" stroke="#4ade80"/>
    <path d="M80 320 Q200 320 350 320" stroke="#6cb4ee"/>
    <path d="M80 320 Q200 440 350 360" stroke="#c084fc"/>

    <!-- Right side paths -->
    <path d="M930 280 Q1080 200 1200 320" stroke="#4ade80"/>
    <path d="M930 320 Q1080 320 1200 320" stroke="#6cb4ee"/>
    <path d="M930 360 Q1080 440 1200 320" stroke="#c084fc"/>
  </g>

  <!-- Input node (left) -->
  <g transform="translate(50, 290)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#6cb4ee" stroke-width="2" opacity="0.5"/>
    <circle cx="30" cy="30" r="8" fill="#6cb4ee" opacity="0.8"/>
  </g>

  <!-- Output node (right) -->
  <g transform="translate(1170, 290)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#6cb4ee" stroke-width="2" opacity="0.5"/>
    <circle cx="30" cy="30" r="8" fill="#6cb4ee" opacity="0.8"/>
  </g>

  <!-- Router icon in center -->
  <g transform="translate(565, 100)">
    <!-- Central hub -->
    <circle cx="75" cy="75" r="55" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.6"/>
    <circle cx="75" cy="75" r="35" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>

    <!-- Router arrows -->
    <g stroke-width="3" stroke-linecap="round" fill="none">
      <!-- Top arrow (Haiku - green) -->
      <path d="M75 40 L75 15" stroke="#4ade80"/>
      <path d="M68 22 L75 15 L82 22" stroke="#4ade80"/>

      <!-- Bottom-left arrow (Sonnet - blue) -->
      <path d="M45 100 L25 120" stroke="#6cb4ee"/>
      <path d="M25 113 L25 120 L32 120" stroke="#6cb4ee"/>

      <!-- Bottom-right arrow (Opus - purple) -->
      <path d="M105 100 L125 120" stroke="#c084fc"/>
      <path d="M118 120 L125 120 L125 113" stroke="#c084fc"/>
    </g>

    <!-- Center dot -->
    <circle cx="75" cy="75" r="12" fill="#6cb4ee" opacity="0.8"/>
  </g>

  <!-- Main title -->
  <text x="640" y="310" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="white">
    Claude Router
  </text>

  <!-- Subtitle -->
  <text x="640" y="375" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" fill="#a0a0a0">
    Intelligent Model Orchestration for Claude Code
  </text>

  <!-- Model pills with colors -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18">
    <!-- Haiku -->
    <rect x="340" y="420" width="120" height="40" rx="20" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.7"/>
    <circle cx="365" cy="440" r="6" fill="#4ade80"/>
    <text x="410" y="446" text-anchor="middle" fill="#4ade80">Haiku</text>

    <!-- Sonnet -->
    <rect x="490" y="420" width="130" height="40" rx="20" fill="none" stroke="#6cb4ee" stroke-width="1.5" opacity="0.7"/>
    <circle cx="515" cy="440" r="6" fill="#6cb4ee"/>
    <text x="565" y="446" text-anchor="middle" fill="#6cb4ee">Sonnet</text>

    <!-- Opus -->
    <rect x="650" y="420" width="110" height="40" rx="20" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.7"/>
    <circle cx="675" cy="440" r="6" fill="#c084fc"/>
    <text x="715" y="446" text-anchor="middle" fill="#c084fc">Opus</text>

    <!-- Cost savings -->
    <rect x="790" y="420" width="170" height="40" rx="20" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
    <text x="875" y="446" text-anchor="middle" fill="#fbbf24">50-70% Savings</text>
  </g>

  <!-- Bottom tagline -->
  <text x="640" y="550" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#666">
    Automatically route queries to the optimal Claude model
  </text>

  <!-- Claude Code badge -->
  <g transform="translate(1080, 50)">
    <rect x="0" y="0" width="150" height="36" rx="18" fill="#6cb4ee" opacity="0.15"/>
    <text x="75" y="24" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#6cb4ee">Claude Code Plugin</text>
  </g>
</svg>